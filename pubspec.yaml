publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  intl: ^0.19.0
  csv: ^6.0.0
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  uuid: ^4.5.1
  fl_chart: ^0.69.0
